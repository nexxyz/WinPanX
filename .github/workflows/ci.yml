name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore .\WinPanX.sln

      - name: Build Debug
        run: dotnet build .\WinPanX.sln -c Debug --no-restore

      - name: Build Release
        run: dotnet build .\WinPanX.sln -c Release --no-restore
